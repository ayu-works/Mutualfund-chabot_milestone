<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MF FAQ Assistant — test UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Mutual Fund FAQ Assistant</h1>
    <p class="disclaimer">
      Facts only. Not investment advice. Sourced from 5 HDFC scheme pages on Groww.
    </p>
  </header>

  <main>
    <aside class="sidebar">
      <div class="row">
        <label for="api-base">API base</label>
        <input id="api-base" type="text" value="http://localhost:8000" />
      </div>
      <button id="new-thread">+ New thread</button>
      <h2>Threads</h2>
      <ul id="threads"></ul>
    </aside>

    <section class="chat">
      <div id="thread-meta" class="thread-meta">No thread selected.</div>
      <ol id="messages" class="messages"></ol>
      <form id="composer">
        <textarea
          id="composer-input"
          rows="2"
          placeholder="Ask about an HDFC scheme on the allowlist…"
          required
        ></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
